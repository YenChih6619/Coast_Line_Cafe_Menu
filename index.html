<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海線咖啡 | 智慧搜尋豆單</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-container">
            <input type="text" id="searchInput" placeholder="搜尋：中深焙、水洗、品名...">
        </div>
    </nav>

    <div class="main-container">
        <header class="main-header">
            <img src="logo.png" alt="海線咖啡" class="shop-logo">
            <div class="divider"></div>
            <p class="menu-date">智能豆單查詢系統</p>
        </header>

        <div id="menuContent">
            <div class="loading">豆單讀取中...</div>
        </div>
    </div>

    <script>
        let coffeeData = [];

        // 從 JSON 檔案載入資料
        async function fetchMenu() {
            try {
                const response = await fetch('menu.json');
                coffeeData = await response.json();
                renderMenu(coffeeData);
            } catch (error) {
                console.error("無法載入豆單資料:", error);
                document.getElementById('menuContent').innerHTML = "資料載入失敗，請稍後再試。";
            }
        }

        // 渲染畫面
        function renderMenu(data) {
            const content = document.getElementById('menuContent');
            if (data.length === 0) {
                content.innerHTML = '<div class="no-result">找不到符合條件的咖啡豆</div>';
                return;
            }

            // 按 A, B, C 區分組
            const sections = ['A', 'B', 'C'];
            let html = '';

            sections.forEach(sec => {
                const items = data.filter(item => item.section === sec);
                if (items.length > 0) {
                    html += `<section class="menu-section">
                                <h2 class="section-title"><span>${sec}.</span> 區</h2>
                                <div class="menu-grid">
                                    ${items.map(item => `
                                        <div class="coffee-card animate-in">
                                            <span class="cup-price">單杯:${item.price_cup}</span>
                                            <p class="series">${item.series}</p>
                                            <h3 class="coffee-name">${item.name}</h3>
                                            <p class="process">${item.process}</p>
                                            <div class="card-details">
                                                <span>${item.roast}</span>
                                                <span>${item.method}</span>
                                            </div>
                                            <p class="flavor">風味：${item.flavor}</p>
                                            <div class="price-box">
                                                <div class="price-row"><span>耳掛</span><span>${item.price_ear}</span></div>
                                                <div class="price-row"><span>半磅</span><span>${item.price_half}</span></div>
                                                <div class="price-row promo"><span>一磅</span><span>特惠:${item.price_one}</span></div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                             </section>`;
                }
            });
            content.innerHTML = html;
        }

        // 搜尋功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = coffeeData.filter(item => 
                item.name.toLowerCase().includes(keyword) || 
                item.roast.toLowerCase().includes(keyword) || 
                item.method.toLowerCase().includes(keyword) ||
                item.flavor.toLowerCase().includes(keyword)
            );
            renderMenu(filtered);
        });

        window.onload = fetchMenu;
    </script>
</body>
</html>
