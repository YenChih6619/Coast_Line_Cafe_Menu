<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BISTRO | 質感手作料理</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>

    <div class="bg-decoration"></div>

    <div class="container">
        <header class="animate__animated animate__fadeIn">
            <p class="brand-est">EST. 2024</p>
            <h1>THE BISTRO</h1>
            <div class="divider"></div>
            <p class="subtitle">Seasonal Tasting Menu</p>
        </header>

        <nav class="menu-nav animate__animated animate__fadeIn animate__delay-1s">
            <a href="#appetizers">前菜</a>
            <a href="#mains">主食</a>
            <a href="#drinks">飲品</a>
        </nav>

        <section id="appetizers" class="menu-section animate__animated animate__fadeInUp">
            <h2 class="section-title">Appetizers</h2>
            
            <div class="menu-grid">
                <div class="menu-card">
                    <div class="card-header">
                        <span class="item-name">松露野菇濃湯</span>
                        <span class="item-price">280</span>
                    </div>
                    <p class="item-desc">嚴選新鮮野菇、現刨黑松露、絲滑鮮奶油</p>
                </div>

                <div class="menu-card">
                    <div class="card-header">
                        <span class="item-name">布拉塔起司沙拉</span>
                        <span class="item-price">420</span>
                    </div>
                    <p class="item-desc">義大利布拉塔起司、彩色小番茄、羅勒油</p>
                </div>
            </div>
        </section>

        <section id="mains" class="menu-section animate__animated animate__fadeInUp">
            <h2 class="section-title">Main Course</h2>
            
            <div class="menu-grid">
                <div class="menu-card highlighted">
                    <div class="card-header">
                        <span class="item-name">熟成肋眼牛排</span>
                        <span class="item-price">1,280</span>
                    </div>
                    <p class="item-desc">10oz Prime等級、蒜球、迷迭香、海鹽</p>
                    <span class="tag">推薦</span>
                </div>

                <div class="menu-card">
                    <div class="card-header">
                        <span class="item-name">香煎干貝海鮮麵</span>
                        <span class="item-price">580</span>
                    </div>
                    <p class="item-desc">北海道生食級干貝、透抽、自製蝦油細扁麵</p>
                </div>
            </div>
        </section>

        <footer>
            <p>價格均以新台幣計算，需另收 10% 服務費</p>
            <p>台北市某某區某某路 123 號 | 02-1234-5678</p>
            <div class="social-icons">
                </div>
        </footer>
    </div>

</body>
</html>
